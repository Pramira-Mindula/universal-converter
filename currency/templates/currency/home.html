<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-300 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-96">
        
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
            🔄 Universal Converter
        </h1>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Conversion Type -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">Conversion Type</label>
                <select name="type"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400">
                    <option value="currency">Currency</option>
                    <option value="length">Length</option>
                    <option value="temperature">Temperature</option>
                </select>
            </div>

            <!-- Amount -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">Value</label>
                <input type="number" name="amount" step="0.01"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400"
                       placeholder="Enter value">
            </div>

            <!-- From -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">From</label>
                <select id="from_unit" name="from_unit"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400">
                </select>
            </div>

            <div class="flex justify-center">
                <button type="button" id="swapBtn"
                        class="bg-gray-200 px-3 py-1 rounded-full hover:bg-gray-300 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="bi bi-arrow-repeat" viewBox="0 0 16 16">
                        <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41m-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9"/>
                        <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5 5 0 0 0 8 3M3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9z"/>
                    </svg>
                </button>
            </div>

            <!-- To -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">To</label>
                <select id="to_unit" name="to_unit"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400">
                </select>
            </div>

            <button type="submit"
                    class="w-full bg-gray-700 text-white py-2 rounded-lg hover:bg-gray-800 transition">
                Convert
            </button>
        </form>

        {% if result %}
        <div class="mt-6 p-3 border border-gray-400 bg-gray-100 text-gray-800 rounded-lg text-center font-semibold">
            Result: {{ result }}
        </div>
        {% endif %}

        {% if error %}
            <div class="mt-6 p-3 border border-red-400 bg-red-100 text-red-600 rounded-lg text-center font-semibold">
                {{ error }}
            </div>
        {% endif %}

    </div>

    <script>
        const typeSelect = document.querySelector('select[name="type"]');
        const fromSelect = document.getElementById("from_unit");
        const toSelect = document.getElementById("to_unit");
        const swapBtn = document.getElementById("swapBtn");

        const units = {
            currency: ["USD", "LKR", "EUR"],
            length: ["Meter", "KM"],
            temperature: ["Celsius", "Fahrenheit"]
        };

        function updateUnits() {
            const selectedType = typeSelect.value;

            fromSelect.innerHTML = "";
            toSelect.innerHTML = "";

            units[selectedType].forEach(unit => {
                const option1 = document.createElement("option");
                option1.value = unit;
                option1.textContent = unit;
                fromSelect.appendChild(option1);

                const option2 = document.createElement("option");
                option2.value = unit;
                option2.textContent = unit;
                toSelect.appendChild(option2);
            });

            preventSameSelection();
        }

        function preventSameSelection() {
            if (fromSelect.value === toSelect.value) {
                if (toSelect.options.length > 1) {
                    toSelect.selectedIndex = 1;
                }
            }
        }

        // When user changes FROM
        fromSelect.addEventListener("change", preventSameSelection);

        // When user changes TO
        toSelect.addEventListener("change", preventSameSelection);

        // Swap button logic
        swapBtn.addEventListener("click", function () {
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
        });

        typeSelect.addEventListener("change", updateUnits);

        // Initialize
        updateUnits();
    </script>

</body>
</html>
