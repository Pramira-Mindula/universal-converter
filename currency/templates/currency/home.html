<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-300 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white shadow-2xl rounded-3xl w-full max-w-5xl flex overflow-hidden">

        <!-- LEFT SIDE -->
        <div class="w-1/2 p-10 border-r border-gray-200">

            <h1 class="text-3xl font-bold text-gray-800 mb-8">
                Universal Converter
            </h1>

            <div class="space-y-6">

                <!-- Conversion Type -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        Conversion Type
                    </label>
                    <select name="type"
                        class="w-full px-4 py-3 border border-gray-400 rounded-xl focus:ring-2 focus:ring-gray-400">
                        <option value="currency">Currency</option>
                        <option value="length">Length</option>
                        <option value="temperature">Temperature</option>
                    </select>
                </div>

                <!-- From -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        From
                    </label>
                    <select name="from_unit" id="from_unit"
                        data-currencies='{{ currencies_json|safe }}'
                        class="w-full px-4 py-3 border border-gray-400 rounded-xl focus:ring-2 focus:ring-gray-400">
                        {% for currency in currencies %}
                            <option value="{{ currency }}">{{ currency }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Swap -->
                <div class="flex justify-center">
                    <button type="button" id="swapBtn"
                        class="bg-gray-200 px-4 py-2 rounded-full hover:bg-gray-300 transition">
                        ⇄
                    </button>
                </div>

                <!-- To -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        To
                    </label>
                    <select name="to_unit" id="to_unit"
                        class="w-full px-4 py-3 border border-gray-400 rounded-xl focus:ring-2 focus:ring-gray-400">
                        {% for currency in currencies %}
                            <option value="{{ currency }}">{{ currency }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Amount -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        Value
                    </label>
                    <input type="number" name="amount" step="0.01"
                        class="w-full px-4 py-3  border border-gray-400 rounded-xl focus:ring-2 focus:ring-gray-400"
                        placeholder="Enter value">
                </div>

            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="w-1/2 p-10 flex flex-col justify-center items-center bg-gray-50">

            <div id="resultDisplay" class="text-center space-y-4">
                <div class="text-gray-500 text-lg">
                    Enter a value to convert
                </div>
            </div>

        </div>

    </div>

    <script>
        const typeSelect = document.querySelector('select[name="type"]');
        const fromSelect = document.getElementById("from_unit");
        const toSelect = document.getElementById("to_unit");
        const amountInput = document.querySelector('input[name="amount"]');
        const resultBox = document.querySelector(".mt-6");
        const swapBtn = document.getElementById("swapBtn");

        const lengthUnits = ["meter", "km"];
        const tempUnits = ["celsius", "fahrenheit"];

        //Restore last selected type
        if (localStorage.getItem("lastType")) {
            typeSelect.value = localStorage.getItem("lastType");
        }

        const currencyUnits = JSON.parse(
            document.getElementById("from_unit").dataset.currencies
        );

        function updateUnits() {
            const selectedType = typeSelect.value;
            localStorage.setItem("lastType", selectedType);

            let units = [];

            if (selectedType === "currency") {
                units = currencyUnits;
            } else if (selectedType === "length") {
                units = lengthUnits;
            } else {
                units = tempUnits;
            }

            fromSelect.innerHTML = "";
            toSelect.innerHTML = "";

            units.forEach(unit => {
                fromSelect.innerHTML += `<option value="${unit}">${unit}</option>`;
                toSelect.innerHTML += `<option value="${unit}">${unit}</option>`;
            });

            if (units.length > 1) {
                toSelect.selectedIndex = 1; 
            }

            amountInput.value = "";
                document.getElementById("resultDisplay").innerHTML =
                    `<div class="text-gray-500 text-lg">Enter a value to convert</div>`;
        }

        async function autoConvert() {
            const amount = amountInput.value;
            if (!amount) return;

            const type = typeSelect.value;
            const from = fromSelect.value;
            const to = toSelect.value;

            const response = await fetch(`/convert/?amount=${amount}&type=${type}&from_unit=${from}&to_unit=${to}`);
            const data = await response.json();

            const resultDisplay = document.getElementById("resultDisplay");

            if (data.result !== undefined) {
                resultDisplay.innerHTML = `
                    <div class="text-gray-500 text-lg">
                        ${amount} ${from}
                    </div>
                    <div class="text-5xl font-bold text-gray-800">
                        ${data.result}
                    </div>
                    <div class="text-gray-500 text-lg">
                        ${to}
                    </div>
                `;
            }
        }

        //Event Listeners
        typeSelect.addEventListener("change", () => {
            updateUnits();
            autoConvert();
        });

        fromSelect.addEventListener("change", autoConvert);
        toSelect.addEventListener("change", autoConvert);
        amountInput.addEventListener("input", autoConvert);

        swapBtn.addEventListener("click", () => {
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            autoConvert();
        });

        updateUnits();
    </script>

</body>
</html>
