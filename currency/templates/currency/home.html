<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-300 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-96">
        
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
            🔄 Universal Converter
        </h1>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Conversion Type -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">Conversion Type</label>
                <select name="type"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400">
                    <option value="currency">Currency</option>
                    <option value="length">Length</option>
                    <option value="temperature">Temperature</option>
                </select>
            </div>

            <!-- Amount -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">Value</label>
                <input type="number" name="amount" step="0.01"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400"
                       placeholder="Enter value">
            </div>

            <!-- From -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">From</label>
                <select name="from_unit"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="AUD">AUD</option>
                    <option value="LKR">LKR</option>
                    <option value="meter">Meter</option>
                    <option value="km">Kilometer</option>
                    <option value="celsius">Celsius</option>
                    <option value="fahrenheit">Fahrenheit</option>
                </select>
            </div>

            <!-- To -->
            <div>
                <label class="block text-gray-600 text-sm mb-1">To</label>
                <select name="to_unit"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-400">
                    <option value="LKR">LKR</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="AUD">AUD</option>
                    <option value="km">Kilometer</option>
                    <option value="meter">Meter</option>
                    <option value="fahrenheit">Fahrenheit</option>
                    <option value="celsius">Celsius</option>
                </select>
            </div>

            <button type="submit"
                    class="w-full bg-gray-700 text-white py-2 rounded-lg hover:bg-gray-800 transition">
                Convert
            </button>
        </form>

        {% if result %}
        <div class="mt-6 p-4 bg-gray-100 text-gray-800 rounded-lg text-center font-semibold">
            Result: {{ result }}
        </div>
        {% endif %}

    </div>

</body>
</html>
